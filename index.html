


<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Caterpillar Display</title>
  

    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: #f4f6f8;
        color: #0000aa;

        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* HEADER */
      .header {
        background-color: #F9F8F5;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header svg{
        transform: scale(2);
        transform-origin: left center;
      }
      .header img {
        width: 182px;
      }

      /* PAGE */
      .container {
        padding: 40px;
        flex: 1;
      }

      /* TABS */
      .tabs {
        display: flex;
        gap: 15px;
      }

      .tab {
        position: relative;
        padding: 14px 30px;
        background: #ffcb1144;
        color: #282828;
        border-radius: 10px 10px 0 0;
        cursor: pointer;
        font-weight: bold;
      }

      .tab.active {
        background: #ffffff;
      }

      .tab.active::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 100%;
        height: 4px;
        background: #ffcd11;
        border-radius: 2px;
      }

      /* CONTENT */
      .content-wrapper {
        background: #ffffff;
        padding: 30px;
        border-radius: 0 15px 15px 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        min-height: calc(100vh - 260px);
      }

      /* TAB CONTENT */
      .tab-content {
        display: none;
        animation: fadeSlide 0.35s ease;
      }

      .tab-content.active {
        display: block;
      }

      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(12px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* GRID */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        max-width: 100%;
      }

      .card {
        background: #ffcd11;
        padding: 0px;
        text-align: center;
        border-radius: 12px;
        font-weight: bold;
        /* width: 240px; */
      }

      .card a {
        text-decoration: none;
        color: #000;
        padding: 20px 30px;
        display: inline-block;
        width: 100%;
      }

      footer {
        margin-top: auto;
        text-align: center;
        font-size: 12px;
        color: #777;
        padding: 15px 0;
      }
    </style>
  </head>

  <body>
    <div class="header">
     
        <img src="https://s7d2.scene7.com/is/image/Caterpillar/CM20220222-5c3c2-280a8?fmt=png-alpha" alt="">


      <img src="https://cdn.prod.website-files.com/66b3765153a8a0c399c70981/67841a1262a89b9b12350e7d_Vertiv-Logo%201%20(1).webp" alt="Omnicom Production Logo" />
    </div>

    <div class="container">
      <div class="tabs">
        <div class="tab active" onclick="openTab('option1', this)">Caterpillar V1</div>
        <div class="tab" onclick="openTab('option2', this)">Caterpillar V2</div>
      </div>

      <div class="content-wrapper">
        <div id="option1" class="tab-content active">
          <div class="grid">
            <div class="card">
              <a
                target="_blank"
                href="v1/300x250/index.html"
                >300x250</a
              >
            </div>
            <div class="card">
              <a
                target="_blank"
                href="v1/300x600/index.html"
                >300x600</a
              >
            </div>
            <div class="card">
              <a
                target="_blank"
                href="v1/160x600/index.html"
                >160x600</a
              >
            </div>
            <div class="card">
              <a
                target="_blank"
                href="v1/728x90/index.html"
                >728x90</a
              >
            </div>
            
            
          </div>
        </div>
        <div id="option2" class="tab-content">
          <div class="grid">
            <div class="card">
              <a
                target="_blank"
                href="v2/300x250/index.html"
                >300x250</a
              >
            </div>
            <div class="card">
              <a
                target="_blank"
                href="v2/300x600/index.html"
                >300x600</a
              >
            </div>
            <div class="card">
              <a
                target="_blank"
                href="v2/160x600/index.html"
                >160x600</a
              >
            </div>
            <div class="card">
              <a
                target="_blank"
                href="v2/728x90/index.html"
                >728x90</a
              >
            </div>
            
            
          </div>
        </div>
        
      </div>
    </div>

    <footer>
      Omnicom Production &nbsp; x &nbsp; Caterpillar
    </footer>

    <script>
      document.getElementById("year").innerHTML = new Date().getFullYear();

      function openTab(tabId, el) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));

        el.classList.add("active");
        document.getElementById(tabId).classList.add("active");
      }
    </script>
  </body>
</html>
